<!DOCTYPE html>
<html lang="pt-BR">
<!--lang é para colocar em determinada linguagem-->
<head>
	<meta charset="UTF-8">
<!--utf-8 é para conseguir colocar as virgulas, acentos etc-->
	<title>Título da Página</title>
<!--title é para colocar um titulo-->
</head>
<body>
	<!--Conteudo visível vai aqui -->
	<h1>Olá, Mundo!</h1>
<!--h1 é a fraze principal principal -->
	<br>
	<br>
	<h2> teste de tag</h2>
<!--h2 e em sequencia é os titulos secundarios e etc -->

	<strong>Importante!</strong>
<!--strong é para deixar em negrito-->
	<p>Este é um parágrafo de texto.</p>
<!--p é para dar um paragrafo-->
	<em> Ênfase</em>
<!--em é para deixar em italico-->
	<br>
	<br>
<!--br é para pular uma linha-->
	<a href=""https://google.com" target="_blank">google</a>
<!--a significa a ancora,ancorage, href é para refernciar um link target _blank é para abrir em outra pagina-->

	<!--link interno-->
	<a href="sobre.html">Sobre</a>
	<!--Se tiver só o nome do arquivo .html é porque tá na mesma pagina se não estiver tem que colocar o link certo-->

	<!--Link para email -->
	<a href="mailto:email@exemplo.com">Enviar Email</a>
    <br>
<!--mailto é para mandar um email para um email-->
    <img src="download.jfif" alt="Descrição da imagem"width="500" height="300">
    <br>
    <img src="https://neofeed.com.br/wp-content/uploads/2021/11/gol-carro-popular.jpg" alt="Descrição da imagem"width="500" height="300">

<!--se estiver o arquivo apenas foto.jpg é porque está no mesmo arquivo-->
<!--width e height é para mrxer no tamanho da imagem-->

</body>
</html>
